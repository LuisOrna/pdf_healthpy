<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Asismed - Generar Formulario</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 500px; margin: 60px auto; padding: 0 20px; }
        h1 { font-size: 1.4rem; margin-bottom: 8px; }
        p { color: #555; margin-bottom: 24px; }
        input[type="file"] { display: block; margin-bottom: 16px; }
        button { background: #1a73e8; color: white; border: none; padding: 10px 24px; border-radius: 4px; cursor: pointer; font-size: 1rem; }
        button:hover { background: #1558b0; }
    </style>
</head>
<body>
    <h1>Cargar foto de cedula</h1>
    <p>Sube la foto de la cedula del cliente para extraer los datos automaticamente.</p>
    <form action="/upload" method="post" enctype="multipart/form-data">
        <input type="file" name="photo" accept=".jpg,.jpeg,.png" required>
        <button type="submit">Extraer datos</button>
    </form>
</body>
</html>
